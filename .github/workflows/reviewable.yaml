# This workflow will run make reviewable and make check-diff as checks

name: make reviewable && make check-Diff

on:
  pull_request:
  workflow_call: {}
  push:
    tags:
      - v*
    branches:
      - main

env:
  GO_IMPORT_VERSION: 'v0.16.1'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.24'

      - name: Install goimports
        run: |
          cd /tmp
          go install golang.org/x/tools/cmd/goimports@${{ env.GO_IMPORT_VERSION }}

      - name: make reviewable
        run: make reviewable
        env:
          RUNNING_IN_CI: 'true'

      - name: tidy
        run: go mod tidy

      - name: sync chart version
        run: make helm-chart

      - name: make check-diff
        run: make check-diff
      
      - name: run tests
        run: make test
      
      - name: build
        run: make build
